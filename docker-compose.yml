services:
  tunnel:
    build: ./tunnel
    image: ghcr.io/guestway-io/singlestore-studio-tunnel:latest
    container_name: guestway-singlestore-tunnel
    restart: unless-stopped
    env_file:
      - .env
    environment:
      STUDIO_HOST: "${STUDIO_HOST}"
      REMOTE_DB_HOST: "${REMOTE_DB_HOST:-127.0.0.1}"
      REMOTE_DB_PORT: "${REMOTE_DB_PORT:-3306}"
      TUNNEL_LISTEN_PORT: "3306"
      CF_ACCESS_CLIENT_ID: "${CF_ACCESS_CLIENT_ID:-}"
      CF_ACCESS_CLIENT_SECRET: "${CF_ACCESS_CLIENT_SECRET:-}"
      CF_AUTHORIZATION: "${CF_AUTHORIZATION:-}"
    networks:
      - mcp-net
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 3306 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  mcp:
    build: .
    image: ghcr.io/guestway-io/singlestore-mcp-server:latest
    container_name: guestway-singlestore-mcp
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MCP_HTTP_ENABLED: "true"
      MCP_HTTP_HOST: "0.0.0.0"
      MCP_HTTP_PORT: "8081"
      SINGLESTORE_HOST: "tunnel"
      SINGLESTORE_PORT: "3306"
    ports:
      - "8081:8081"
    networks:
      - mcp-net
    depends_on:
      tunnel:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8081/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  mcp-net:
    driver: bridge
