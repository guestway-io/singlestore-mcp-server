name: Build and publish container images

# Publishes the two images consumed by the MCP Fargate task in
# guestway-io/infrastructure (fargate/mcp/mcp-fargate-stack.yml):
#
#   ghcr.io/guestway-io/singlestore-mcp-server     <- main app
#   ghcr.io/guestway-io/singlestore-studio-tunnel  <- websocat sidecar
#
# Both are built multi-arch (linux/amd64 + linux/arm64) so the Fargate
# task can run on Graviton (arm64) for cost savings.

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

concurrency:
  group: publish-images-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    name: ${{ matrix.image.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: singlestore-mcp-server
            context: .
            dockerfile: Dockerfile
          - name: singlestore-studio-tunnel
            context: ./tunnel
            dockerfile: ./tunnel/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}
