name: Publish image to GHCR

# Manual-trigger build of the SingleStore MCP image consumed by the
# infrastructure repo's MCP Fargate task. The workflow:
#
#   1. Builds Dockerfile for linux/arm64 only — Fargate runs on Graviton.
#      (Switch to a native arm64 runner like `ubuntu-24.04-arm` to drop
#      the QEMU emulation overhead if the build ever feels slow.)
#   2. Pushes to ghcr.io/<org>/singlestore-mcp-server with tags
#      :latest and :sha-<short>.
#
# Package visibility (private vs public) is managed manually in the
# GitHub UI — the Fargate task needs a public package OR an
# imagePullSecret. Set it once at:
# https://github.com/orgs/guestway-io/packages/container/singlestore-mcp-server/settings
#
# Trigger from the Actions tab. After a successful run, force-deploy the
# Fargate service so it pulls the new :latest:
#   aws ecs update-service --force-new-deployment \
#     --cluster guestway-fargate-production --service production-mcp

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/singlestore-mcp-server

concurrency:
  group: publish-image
  cancel-in-progress: false

jobs:
  publish:
    name: Build and push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          {
            echo "### Pushed"
            echo ""
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
            echo ""
            echo "Force the Fargate service to pull the new image:"
            echo ""
            echo '```bash'
            echo "aws ecs update-service --force-new-deployment \\"
            echo "  --cluster guestway-fargate-production \\"
            echo "  --service production-mcp"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
